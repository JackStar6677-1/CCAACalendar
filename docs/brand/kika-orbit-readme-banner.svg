<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kika Orbit README banner</title>
  <desc id="desc">Banner orbital para Kika Orbit con gradientes naranjos, morados y dorados.</desc>
  <style>
    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(14px, -10px, 0) scale(1.04); }
    }
    @keyframes pulse {
      0%, 100% { opacity: .45; }
      50% { opacity: .9; }
    }
    .orb { animation: drift 8s ease-in-out infinite; transform-origin: center; }
    .spark { animation: pulse 3s ease-in-out infinite; }
    .delay-a { animation-delay: 1.2s; }
    .delay-b { animation-delay: 2.1s; }
  </style>
  <defs>
    <linearGradient id="bg" x1="83" y1="32" x2="1086" y2="493" gradientUnits="userSpaceOnUse">
      <stop stop-color="#180C2E"/>
      <stop offset="0.45" stop-color="#37115A"/>
      <stop offset="1" stop-color="#FF7A2F"/>
    </linearGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 190) rotate(145) scale(230 180)">
      <stop stop-color="#FFE08A"/>
      <stop offset="0.4" stop-color="#FF9B42"/>
      <stop offset="1" stop-color="#FF5A3D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(295 116) rotate(57) scale(266 205)">
      <stop stop-color="#8E4DFF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#8E4DFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-120" y="-120" width="1440" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="38" fill="url(#bg)"/>
  <g filter="url(#blur)">
    <circle cx="930" cy="180" r="230" fill="url(#sun)"/>
    <circle cx="270" cy="105" r="250" fill="url(#violet)"/>
  </g>
  <path d="M51 322C244 190 391 151 603 176C781 197 915 161 1118 54" stroke="#FFE08A" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M83 357C265 239 423 214 613 234C816 255 936 221 1151 94" stroke="#FFB86B" stroke-opacity="0.28" stroke-width="2"/>
  <g class="orb">
    <ellipse cx="824" cy="208" rx="172" ry="58" transform="rotate(-18 824 208)" stroke="#FFE08A" stroke-width="3" stroke-opacity="0.78"/>
    <ellipse cx="824" cy="208" rx="106" ry="36" transform="rotate(18 824 208)" stroke="#B989FF" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="824" cy="208" r="72" fill="#26103F" stroke="#FFE08A" stroke-width="3"/>
    <circle cx="824" cy="208" r="49" fill="#FF7A2F"/>
    <circle cx="850" cy="184" r="18" fill="#FFE08A" fill-opacity="0.75"/>
  </g>
  <circle class="spark" cx="165" cy="82" r="4" fill="#FFE08A"/>
  <circle class="spark delay-a" cx="1018" cy="318" r="5" fill="#FFB86B"/>
  <circle class="spark delay-b" cx="1090" cy="135" r="3" fill="#E5D1FF"/>
  <text x="78" y="154" fill="#FFF8ED" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-3">Kika Orbit</text>
  <text x="82" y="209" fill="#FFE9C8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Calendario vivo para centros de estudiantes</text>
  <text x="82" y="260" fill="#F6DFFF" font-family="Segoe UI, Arial, sans-serif" font-size="20">FastAPI · PWA · RUT interno · Google Calendar oficial · Feriados Chile</text>
  <g transform="translate(82 306)">
    <rect width="156" height="42" rx="21" fill="#FFE08A"/>
    <text x="23" y="28" fill="#32114E" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">MVP en órbita</text>
  </g>
  <g transform="translate(252 306)">
    <rect width="222" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.2"/>
    <text x="22" y="28" fill="#FFF8ED" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Psicología primero</text>
  </g>
</svg>
