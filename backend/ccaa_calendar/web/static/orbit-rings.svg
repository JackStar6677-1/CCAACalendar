<svg width="640" height="640" viewBox="0 0 640 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CCAACalendar animated rings</title>
  <desc id="desc">Anillos orbitales decorativos para la interfaz de CCAACalendar.</desc>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes glow { 0%, 100% { opacity: .42; } 50% { opacity: .9; } }
    .ring-a { animation: spin 24s linear infinite; transform-origin: 320px 320px; }
    .ring-b { animation: spin 17s linear infinite reverse; transform-origin: 320px 320px; }
    .star { animation: glow 3.6s ease-in-out infinite; }
  </style>
  <defs>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 320) rotate(90) scale(138)">
      <stop stop-color="#FFE08A"/>
      <stop offset=".42" stop-color="#FF7A2F"/>
      <stop offset="1" stop-color="#8F5CFF" stop-opacity=".12"/>
    </radialGradient>
  </defs>
  <circle cx="320" cy="320" r="116" fill="url(#core)" opacity=".86"/>
  <ellipse class="ring-a" cx="320" cy="320" rx="252" ry="82" stroke="#FFE08A" stroke-width="6" stroke-opacity=".44"/>
  <ellipse class="ring-b" cx="320" cy="320" rx="210" ry="58" transform="rotate(28 320 320)" stroke="#B989FF" stroke-width="5" stroke-opacity=".5"/>
  <circle class="star" cx="510" cy="242" r="10" fill="#FFE08A"/>
  <circle class="star" cx="150" cy="386" r="7" fill="#FFB86B" style="animation-delay: 1.2s"/>
  <circle class="star" cx="418" cy="452" r="5" fill="#E5D1FF" style="animation-delay: 2.1s"/>
</svg>
